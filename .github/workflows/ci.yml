name: Quality And Cypress Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run static quality checks
        run: npm run quality:check

  cypress-run:
    name: Run ${{ matrix.suite }} tests
    runs-on: ubuntu-latest
    needs: quality-gate
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        suite: [api, frontend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create cypress.env.json
        run: |
          echo '{
            "API_URL": "https://serverest.dev",
            "BASE_URL": "https://front.serverest.dev",
            "ADMIN_EMAIL": "${{ secrets.ADMIN_EMAIL }}",
            "ADMIN_PASSWORD": "${{ secrets.ADMIN_PASSWORD }}",
            "ADMIN_NAME": "${{ secrets.ADMIN_NAME }}",
            "RUN_ID": "${{ github.run_id }}-${{ github.run_attempt }}"
          }' > cypress.env.json

      - name: Run ${{ matrix.suite }} tests
        run: npm run cypress:raw:${{ matrix.suite }} -- --env RUN_ID=${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-report-${{ matrix.suite }}
          path: cypress/reports/
          retention-days: 30

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots-${{ matrix.suite }}
          path: cypress/artifacts/screenshots/
          retention-days: 7

  merge-reports:
    name: Merge & Publish Report
    runs-on: ubuntu-latest
    needs: cypress-run
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download reports
        uses: actions/download-artifact@v4
        with:
          pattern: cypress-report-*
          path: cypress/reports/
          merge-multiple: true

      - name: Generate merged HTML report
        run: npm run report:merge && npm run report:generate && npm run report:executive

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        with:
          name: cypress-report-merged
          path: |
            cypress/reports/report.html
            cypress/reports/executive-report.html
            cypress/reports/executive-summary.md
          retention-days: 30

      - name: Publish executive summary in workflow
        run: cat cypress/reports/executive-summary.md >> $GITHUB_STEP_SUMMARY
